name: Pipeline · Daily Data Refresh

on:
  schedule:
    # 每天 UTC 21:30 (美东下午 4:30 — 刚好赶在美国股市收盘后, FRED 日度数据基本全了)
    - cron: "30 21 * * *"
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit pipeline JSON back to main"
        type: boolean
        default: true

permissions:
  contents: write   # 需要 push pipeline/output 和 inflation-dashboard/data/pipeline

concurrency:
  group: pipeline-daily
  cancel-in-progress: false

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install deps
        run: pip install -r pipeline/requirements.txt

      - name: Run pipeline
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m pipeline.run_daily

      - name: Check for changes
        id: diff
        run: |
          git add inflation-dashboard/data/pipeline pipeline/output 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit & push
        if: ${{ steps.diff.outputs.changed == 'true' && (github.event.inputs.commit_changes != 'false') }}
        run: |
          git config user.name  "inflation-monitor-bot"
          git config user.email "inflation-monitor-bot@users.noreply.github.com"
          ts=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "chore(pipeline): daily refresh · $ts"
          git push

      - name: Summary
        if: always()
        run: |
          echo "## Pipeline output" >> $GITHUB_STEP_SUMMARY
          for f in pipeline/output/*.json; do
            if [ -f "$f" ]; then
              echo "- \`$f\` — $(wc -c < "$f" | tr -d ' ') bytes" >> $GITHUB_STEP_SUMMARY
            fi
          done
          if [ -f pipeline/output/score.json ]; then
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat pipeline/output/score.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
